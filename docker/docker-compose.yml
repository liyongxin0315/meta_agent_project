# =============================================================================
# MetaAgent Docker Compose - 开发环境
# =============================================================================
# 服务：MetaAgent + Redis + Prometheus + Grafana
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # MetaAgent 主应用
  # ---------------------------------------------------------------------------
  metaagent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: metaagent
    ports:
      - "8000:8000"  # HTTP API
      - "9090:9090"  # Prometheus 指标
    environment:
      # 运行环境
      - META_AGENT_ENV=development
      - LOG_LEVEL=DEBUG
      # LLM API 密钥（从 .env 文件读取）
      - LLM_API_KEY=${LLM_API_KEY}
      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      # 挂载源码（开发模式热重载）
      - ../src:/app/src
      - ../config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - metaagent-network
    restart: unless-stopped
    depends_on:
      - redis

  # ---------------------------------------------------------------------------
  # Redis 缓存服务
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: metaagent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - metaagent-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ---------------------------------------------------------------------------
  # Prometheus 监控服务
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: metaagent-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ../config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - metaagent-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana 可视化面板
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: metaagent-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - metaagent-network
    restart: unless-stopped
    depends_on:
      - prometheus

# =============================================================================
# 数据卷定义
# =============================================================================
volumes:
  redis-data:
  prometheus-data:
  grafana-data:

# =============================================================================
# 网络配置
# =============================================================================
networks:
  metaagent-network:
    driver: bridge
