[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = """
    -v
    --strict-markers
    --tb=short
    --color=yes
    --cov=src/meta_agent
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=80
"""
markers = [
    "unit: 标记为单元测试",
    "integration: 标记为集成测试",
    "performance: 标记为性能测试",
    "security: 标记为安全测试",
    "slow: 标记为慢速测试",
    "e2e: 标记为端到端测试",
]
junit_family = "xunit2"
junitxml = "reports/pytest/results.xml"

[tool.coverage.run]
source = ["src/meta_agent"]
omit = [
    "*/tests/*",
    "*/__init__.py",
    "*/version.py",
    "*/conftest.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
precision = 2
