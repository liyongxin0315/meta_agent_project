version: '3.8'

services:
  metaagent:
    build:
      context: .
      target: production
    container_name: metaagent
    ports:
      - "9090:9090"
    environment:
      - META_AGENT_ENVIRONMENT=production
      - META_AGENT_LOG_LEVEL=INFO
      - META_AGENT_LLM_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - metaagent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: metaagent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - metaagent-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  prometheus:
    image: prom/prometheus:latest
    container_name: metaagent-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - metaagent-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: metaagent-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - metaagent-network
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  metaagent-network:
    driver: bridge
