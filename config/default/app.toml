# MetaAgent 默认配置（开发环境）

[app]
name = "MetaAgent"
version = "1.0.0"
environment = "development"
debug = true

[logging]
level = "DEBUG"
format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

[llm]
# API 密钥从环境变量读取
# api_key = ${LLM_API_KEY}
base_url = "https://api.openai.com/v1"
model = "gpt-4"
timeout = 30

[redis]
host = "localhost"
port = 6379
db = 0

[server]
host = "0.0.0.0"
port = 8000
workers = 1
