# MetaAgent 测试环境配置

[app]
name = "MetaAgent-Test"
version = "1.0.0"
environment = "test"
debug = true

[logging]
level = "DEBUG"
format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

[llm]
# 测试使用 mock
mock = true

[redis]
host = "localhost"
port = 6379
db = 15

[server]
host = "127.0.0.1"
port = 8001
workers = 1
